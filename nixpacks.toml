# nixpacks.toml
# Lock Python provider version to 3.11 and resolve OpenCV headless bindings.

[variables]
PYTHON_VERSION = "3.11"

[providers.python]
version = "3.11"

[phases.install]
cmds = [
    "python -m venv .venv",
    ".venv/bin/pip install --upgrade pip",
    ".venv/bin/pip install -r requirements.txt",
    ".venv/bin/pip uninstall -y opencv-python opencv-python-headless",
    ".venv/bin/pip install opencv-contrib-python"
]
